<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSB × NYT Market Sentiment Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: #7c83e0; white-space: nowrap; }
    #ticker-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #3d4166; background: transparent; color: #9ba3c7; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .tab-btn.active { background: #7c83e0; border-color: #7c83e0; color: #fff; font-weight: 600; }
    .tab-btn:hover:not(.active) { border-color: #7c83e0; color: #c0c5f0; }
    #refresh-btn { margin-left: auto; padding: 6px 16px; border-radius: 6px; border: none; background: #4f54b0; color: #fff; cursor: pointer; font-size: 0.85rem; }
    #refresh-btn:hover { background: #6067cc; }
    #last-updated { font-size: 0.75rem; color: #6b7280; white-space: nowrap; }
    main { flex: 1; padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; }
    #loading { text-align: center; padding: 60px; color: #6b7280; font-size: 1.1rem; }
    #error-msg { background: #3b1111; border: 1px solid #7f1d1d; border-radius: 8px; padding: 16px; color: #fca5a5; margin-bottom: 20px; display: none; }
    .section { margin-bottom: 28px; }
    .cards-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; }
    .stat-card { min-width: 150px; flex: 1; }
    .stat-card .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-card .value { font-size: 2.2rem; font-weight: 700; color: #e2e8f0; }
    .stat-card .sub { font-size: 0.78rem; color: #6b7280; margin-top: 4px; }
    .rank-delta { font-size: 0.82rem; margin-left: 6px; }
    .rank-delta.up   { color: #86efac; }
    .rank-delta.down { color: #fca5a5; }
    .rank-delta.same { color: #6b7280; }
    .sentiment-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-left: 8px; }
    .sentiment-badge.Bullish { background: #14532d; color: #86efac; }
    .sentiment-badge.Bearish { background: #450a0a; color: #fca5a5; }
    .sentiment-badge.Neutral  { background: #1e3a5f; color: #93c5fd; }
    .chart-card { width: 100%; padding: 20px; }
    .chart-card h2 { font-size: 0.9rem; color: #9ba3c7; margin-bottom: 16px; }
    #trend-chart { max-height: 240px; }
    .nyt-panel { display: flex; gap: 16px; flex-wrap: wrap; }
    .nyt-summary-card { flex: 1; min-width: 280px; }
    .nyt-summary-card h2 { font-size: 0.9rem; color: #9ba3c7; margin-bottom: 8px; }
    .nyt-summary-card p { font-size: 0.9rem; line-height: 1.6; color: #cbd5e1; }
    .nyt-summary-card .rationale { margin-top: 10px; font-size: 0.8rem; color: #6b7280; font-style: italic; }
    .articles-list { flex: 1; min-width: 280px; }
    .articles-list h2 { font-size: 0.9rem; color: #9ba3c7; margin-bottom: 10px; }
    .article-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #2d3148; }
    .article-item:last-child { border-bottom: none; }
    .article-item a { color: #818cf8; font-size: 0.9rem; font-weight: 500; text-decoration: none; }
    .article-item a:hover { text-decoration: underline; }
    .article-item .meta { font-size: 0.75rem; color: #6b7280; margin-top: 3px; }
    .article-item .abstract { font-size: 0.82rem; color: #94a3b8; margin-top: 4px; }
    .source-tag { font-size: 0.7rem; color: #4b5563; margin-top: 16px; }
    /* EXTENSION POINT: options projections panel goes here */
    footer { background: #1a1d2e; border-top: 1px solid #2d3148; padding: 14px 24px; text-align: center; font-size: 0.78rem; color: #6b7280; }
  </style>
</head>
<body>

<header>
  <h1>WSB × NYT Sentiment</h1>
  <div id="ticker-tabs"></div>
  <button id="refresh-btn">↻ Refresh</button>
  <span id="last-updated"></span>
</header>

<main>
  <div id="loading">Loading data — this may take a moment on first run…</div>
  <div id="error-msg"></div>
  <div id="dashboard" style="display:none"></div>
</main>

<footer>
  ⚠️ Informational only. Not financial advice. Mention data via ApeWisdom (Reddit aggregation). News via The New York Times.
</footer>

<script>
  let TICKERS = [];
  let allData = {};
  let historyData = [];
  let activeTicker = '';
  let trendChart = null;

  function fmt(ts) { return ts ? new Date(ts * 1000).toLocaleString() : ''; }
  function fmtDate(s) { return s ? new Date(s).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : ''; }

  function rankDelta(rank, rank24h) {
    if (!rank || !rank24h) return '';
    const delta = rank24h - rank;
    if (delta > 0) return `<span class="rank-delta up">▲ ${delta}</span>`;
    if (delta < 0) return `<span class="rank-delta down">▼ ${Math.abs(delta)}</span>`;
    return `<span class="rank-delta same">— same</span>`;
  }

  async function fetchData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    try {
      const [dataRes, histRes] = await Promise.all([fetch('/api/data'), fetch('/api/history')]);
      const dataJson = await dataRes.json();
      const histJson = await histRes.json();
      if (!dataJson.ok) throw new Error(dataJson.error || 'Unknown error');
      allData = dataJson.data;
      TICKERS = dataJson.tickers || Object.keys(allData);
      historyData = histJson.ok ? histJson.history : [];
      if (!activeTicker || !allData[activeTicker]) activeTicker = TICKERS[0] || '';
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      buildTabs();
      renderTicker(activeTicker);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.textContent = 'Error: ' + e.message;
      el.style.display = 'block';
    }
  }

  function buildTabs() {
    const container = document.getElementById('ticker-tabs');
    container.innerHTML = '';
    TICKERS.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (t === activeTicker ? ' active' : '');
      const rank = allData[t] && allData[t].rank != null ? ` #${allData[t].rank}` : '';
      btn.textContent = t + rank;
      btn.onclick = () => { activeTicker = t; buildTabs(); renderTicker(t); };
      container.appendChild(btn);
    });
  }

  function renderTicker(ticker) {
    const d = allData[ticker];
    if (!d) return;

    const ai = d.ai || {};
    const sentiment = ai.sentiment || 'Neutral';
    const badgeClass = ['Bullish','Bearish'].includes(sentiment) ? sentiment : 'Neutral';

    const tickerHistory = historyData
      .filter(h => h.ticker === ticker)
      .sort((a, b) => a.ts - b.ts);

    const rankStr = d.rank != null ? `#${d.rank}` : '—';
    const delta = rankDelta(d.rank, d.rank_24h_ago);

    const articles = (d.articles || []).map(a => `
      <div class="article-item">
        <a href="${escHtml(a.url)}" target="_blank" rel="noreferrer">${escHtml(a.headline || 'Untitled')}</a>
        <div class="meta">${escHtml(fmtDate(a.pub_date))}${a.byline ? ' · ' + escHtml(a.byline) : ''}</div>
        ${a.abstract ? `<div class="abstract">${escHtml(a.abstract)}</div>` : ''}
      </div>`).join('') || '<p style="color:#6b7280;font-size:0.85rem">No recent NYT articles found.</p>';

    document.getElementById('dashboard').innerHTML = `
      <div class="cards-row">
        <div class="card stat-card">
          <div class="label">24h Mentions</div>
          <div class="value">${(d.mention_count || 0).toLocaleString()}</div>
          <div class="sub">${(d.mentions_24h_ago || 0).toLocaleString()} mentions yesterday</div>
        </div>
        <div class="card stat-card">
          <div class="label">Upvotes</div>
          <div class="value">${(d.upvotes || 0).toLocaleString()}</div>
        </div>
        <div class="card stat-card">
          <div class="label">Rank ${delta}</div>
          <div class="value">${escHtml(rankStr)}</div>
          <div class="sub">${d.rank_24h_ago != null ? `was #${d.rank_24h_ago} yesterday` : ''}</div>
        </div>
        <div class="card stat-card">
          <div class="label">NYT Sentiment</div>
          <div class="value" style="font-size:1.3rem;margin-top:6px">
            <span class="sentiment-badge ${badgeClass}">${escHtml(sentiment)}</span>
          </div>
        </div>
      </div>

      <div class="card chart-card section">
        <h2>Mention Trend — ${escHtml(ticker)}</h2>
        <canvas id="trend-chart"></canvas>
      </div>

      <div class="nyt-panel section">
        <div class="card nyt-summary-card">
          <h2>NYT AI Summary <span class="sentiment-badge ${badgeClass}">${escHtml(sentiment)}</span></h2>
          <p>${escHtml(ai.summary || 'No summary available.')}</p>
          ${ai.rationale ? `<p class="rationale">${escHtml(ai.rationale)}</p>` : ''}
        </div>
        <div class="card articles-list">
          <h2>Recent NYT Articles</h2>
          ${articles}
        </div>
      </div>

      <!-- EXTENSION POINT: options projections panel goes here -->

      <p class="source-tag">Mention data sourced from <a href="https://apewisdom.io" target="_blank" style="color:#4b5563">ApeWisdom</a> (Reddit aggregation across r/wallstreetbets and related subreddits).</p>
    `;

    buildTrendChart(tickerHistory);
  }

  function buildTrendChart(history) {
    const ctx = document.getElementById('trend-chart');
    if (!ctx) return;
    if (trendChart) { trendChart.destroy(); trendChart = null; }
    if (!history.length) {
      ctx.parentElement.insertAdjacentHTML('beforeend', '<p style="color:#6b7280;font-size:0.82rem;margin-top:8px">Not enough history yet — data accumulates across refreshes.</p>');
      return;
    }
    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: history.map(h => fmt(h.ts)),
        datasets: [{
          label: 'Mentions',
          data: history.map(h => h.mention_count),
          borderColor: '#7c83e0',
          backgroundColor: 'rgba(124,131,224,0.15)',
          tension: 0.3,
          fill: true,
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6b7280', maxTicksLimit: 8 }, grid: { color: '#1e2235' } },
          y: { ticks: { color: '#6b7280' }, grid: { color: '#1e2235' }, beginAtZero: true }
        }
      }
    });
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('refresh-btn').addEventListener('click', fetchData);
  fetchData();
</script>
</body>
</html>
